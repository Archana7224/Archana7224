<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" rx="24" fill="none">
  <rect width="1180" height="610" rx="24" fill="#FFFFFF" stroke="rgba(15,23,42,.08)" stroke-width="2"/>
  <defs>
    <linearGradient id="asciiGradientLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB">
        <animate attributeName="stop-color" values="#2563EB;#06B6D4;#10B981;#2563EB" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#06B6D4">
        <animate attributeName="stop-color" values="#06B6D4;#10B981;#2563EB;#06B6D4" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glowLight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ASCII -->
  <g transform="translate(40,40)">
    <text font-family="monospace" font-size="14" fill="url(#asciiGradientLight)" filter="url(#glowLight)">
      <tspan x="0" dy
