<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" rx="24" fill="none">
  <!-- Background -->
  <rect width="1180" height="610" rx="24" fill="#030712" stroke="rgba(255,255,255,.08)" stroke-width="2"/>
  <defs>
    <linearGradient id="asciiGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="12s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#10B981;#7C3AED;#22D3EE" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glowDark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left ASCII -->
  <g transform="translate(40,40)">
    <text font-family="monospace" font-size="14" fill="url(#asciiGradientDark)" filter="url(#glowDark)">
      <tspan x="0" dy="1.2em">      █████╗ ██████╗ </tspan>
      <tspan x="0" dy="1.2em">     ██╔══██╗██╔══██╗</tspan>
      <tspan x="0" dy="1.2em">     ███████║██████╔╝</tspan>
      <tspan x="0" dy="1.2em">     ██╔══██║██╔═══╝ </tspan>
      <tspan x="0" dy="1.2em">     ██║  ██║██║     </tspan>
      <tspan x="0" dy="1.2em">     ╚═╝  ╚═╝╚═╝     </tspan>
      <animate attributeName="opacity" values="0;1" dur="6s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Right Terminal -->
  <g transform="translate(460,60)">
    <rect width="660" height="490" rx="16" fill="#0F172A" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
    <text x="30" y="60" font-family="monospace" font-size="22" fill="#F8FAFC">Hi 👋 I'm Archana</text>
    <text x="30" y="100" font-family="monospace" font-size="18" fill="#94A3B8">AI Engineer | ML Developer | Open Source Contributor</text>

    <!-- Info -->
    <text x="30" y="160" font-family="monospace" font-size="16" fill="#F8FAFC">📍 Bhopal, India</text>
    <text x="30" y="190" font-family="monospace" font-size="16" fill="#F8FAFC">🎓 B.Tech AI & ML</text>
    <text x="30" y="220" font-family="monospace" font-size="16" fill="#F8FAFC">🔭 Focus: LLMs & RAG</text>
    <text x="30" y="250" font-family="monospace" font-size="16" fill="#F8FAFC">🌐 github.com/Archana7224</text>
    <text x="30" y="280" font-family="monospace" font-size="16" fill="#F8FAFC">✉️ nairarchana2004@gmail.com</text>

    <!-- Skills Pills -->
    <g transform="translate(30,330)">
      <rect x="0" y="0" width="90" height="28" rx="14" fill="url(#asciiGradientDark)" filter="url(#glowDark)">
        <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="3s" repeatCount="indefinite"/>
      </rect>
      <text x="20" y="20" font-size="14" fill="#F8FAFC">Python</text>
    </g>
    <g transform="translate(140,330)">
      <rect x="0" y="0" width="90" height="28" rx="14" fill="url(#asciiGradientDark)" filter="url(#glowDark)">
        <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="3s" repeatCount="indefinite"/>
      </rect>
      <text x="20" y="20" font-size="14" fill="#F8FAFC">React</text>
    </g>
    <g transform="translate(250,330)">
      <rect x="0" y="0" width="160" height="28" rx="14" fill="url(#asciiGradientDark)" filter="url(#glowDark)">
        <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="3s" repeatCount="indefinite"/>
      </rect>
      <text x="20" y="20" font-size="14" fill="#F8FAFC">Full Stack Developer</text>
    </g>
    <g transform="translate(430,330)">
      <rect x="0" y="0" width="180" height="28" rx="14" fill="url(#asciiGradientDark)" filter="url(#glowDark)">
        <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="3s" repeatCount="indefinite"/>
      </rect>
      <text x="20" y="20" font-size="14" fill="#F8FAFC">GSSoC Contributor 2026</text>
    </g>
    <g transform="translate(640,330)">
      <rect x="0" y="0" width="140" height="28" rx="14" fill="url(#asciiGradientDark)" filter="url(#glowDark)">
        <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="3s" repeatCount="indefinite"/>
      </rect>
      <text x="20" y="20" font-size="14" fill="#F8FAFC">GSSoC Legend</text>
    </g>
  </g>
</svg>
